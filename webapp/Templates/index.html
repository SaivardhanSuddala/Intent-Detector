<!DOCTYPE html>
<html>
<head>
    <title>Intent Detector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #22c55e;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Intent Detector</h1>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="text" placeholder="Enter your message..." required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result">
            Prediction: {{ result }}
        </div>
    {% endif %}
</div>

</body>
</html>
